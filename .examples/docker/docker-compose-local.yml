name: librebooking

services:
  db:
    image: ${CONTAINER_DB_DOCKER_IMAGE:-linuxserver/mariadb}:${CONTAINER_DB_DOCKER_TAG:-10.6.13}
    restart: always
    volumes:
      - db_conf:/config
    env_file:
      - db.env
  app:
    image: ${CONTAINER_APP_DOCKER_IMAGE:-librebooking/librebooking}:${CONTAINER_APP_DOCKER_TAG:-develop}
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - app_conf:/config
      - app_img:/var/www/html/Web/uploads/images
      - app_res:/var/www/html/Web/uploads/reservation
    env_file:
      - lb.env
  cron:
    image: ${CONTAINER_APP_DOCKER_IMAGE:-librebooking/librebooking}:${CONTAINER_APP_DOCKER_TAG:-develop}
    restart: always
    command: supercronic /config/lb-jobs-cron
    depends_on:
      - app
    volumes_from:
      - app
    volumes:
      - ./crontab:/config/lb-jobs-cron:ro
    env_file:
      - lb.env

volumes:
  db_conf:
  app_conf:
  app_img:
  app_res:
